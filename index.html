<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            background: #f0f2f5;
            height: 100vh;
            width: 100vw;
        }

        .hidden { display: none !important; }

        /* --- PHASE 1: THE BAIT --- */
        #bait-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .verify-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            background: #0056b3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            font-weight: bold;
        }

        button:hover { background: #004494; }

        /* --- PHASE 2: THE HACKER TERMINAL --- */
        #hacker-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #050505;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-shadow: 0 0 5px #0f0;
        }

        #hacker-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        .terminal {
            width: 85%;
            max-width: 800px;
            z-index: 3;
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .progress-container {
            width: 100%;
            height: 25px;
            border: 2px solid #0f0;
            margin-top: 30px;
            box-shadow: 0 0 10px #0f0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #0f0;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px #0f0;
        }

        .cursor { animation: blink 1s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- PHASE 3: THE REVEAL --- */
        #reveal-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: alarmPulse 1.5s infinite;
        }

        @keyframes alarmPulse {
            0% { background: radial-gradient(circle, #4a0000, #000); }
            50% { background: radial-gradient(circle, #8a0000, #110000); }
            100% { background: radial-gradient(circle, #4a0000, #000); }
        }

        #reveal-screen h1 {
            font-size: 4rem;
            color: #ff3333;
            text-shadow: 0 0 20px red;
            margin-bottom: 10px;
            font-family: 'Segoe UI', sans-serif;
        }

        #glitch-box {
            display: inline-block;
            padding: 20px 40px;
            border: 3px solid cyan;
            color: cyan;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            background: rgba(0, 255, 255, 0.1);
        }

        #glitch-box:hover {
            animation: shake 0.1s infinite;
            background: red;
            color: white;
            border-color: red;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div id="bait-screen">
        <div class="verify-box">
            <h2 id="bait-text">Human Verification Required 🤖</h2>
            <p>Please click the button below to access the secure portfolio.</p>
            <button id="start-btn">Verify & Enter</button>
        </div>
    </div>

    <div id="hacker-overlay" class="hidden">
        <div class="terminal">
            <div id="terminal-output"></div>
            <span class="cursor">█</span>
            <div id="progress-wrapper" class="hidden">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="status-msg" style="margin-top: 15px; font-weight: bold; font-size: 1.5rem;"></div> 
            </div>
        </div>
    </div>

    <div id="reveal-screen" class="hidden">
        <h1>SYSTEM COMPROMISED 💀</h1>
        <p style="font-size: 1.2rem; font-family: monospace; color: #ccc;">Critical failure. All personal directories have been encrypted and uploaded. 😈</p>
        
        <div id="glitch-box">
            Initiate Emergency Recovery ☢️
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx;
        let alarmInterval;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Generates a high-tech "blip" for typing and progress
        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            // Randomize pitch slightly for a cool tech sound
            osc.frequency.setValueAtTime(800 + Math.random() * 400, audioCtx.currentTime); 
            
            // Short, punchy volume envelope
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Generates a blaring emergency siren
        function playSiren() {
            if (!audioCtx) return;
            
            function triggerSirenCycle() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                
                // Modulate pitch up and down
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.4);
                osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.8);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }

            // Play once immediately, then loop
            triggerSirenCycle();
            alarmInterval = setInterval(triggerSirenCycle, 850);
        }
        // --------------------

        // Start the sequence when the button is clicked
        document.getElementById('start-btn').addEventListener('click', function() {
            // 1. Initialize the audio context (requires this user click!)
            initAudio();

            // 2. Force Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }

            this.innerText = "Verifying... ⏳";
            this.style.background = "#555";
            this.disabled = true;
            document.getElementById('bait-text').innerText = "Connection Established. 👁️";

            setTimeout(startHackingSequence, 2000);
        });

        function startHackingSequence() {
            document.getElementById('bait-screen').classList.add('hidden');
            document.getElementById('hacker-overlay').classList.remove('hidden');

            const fakeIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            const hackLines = [
                `> TARGET ACQUIRED: IP ${fakeIP} 🎯`,
                "> Bypassing primary firewall... 🛡️",
                "> Injecting payload into root directory... 🕷️",
                "> Accessing connected webcam devices... 📸",
                "> Decrypting saved browser passwords... 🔓",
                "> Extracting user files... 💸"
            ];

            const terminalOutput = document.getElementById('terminal-output');
            let lineIndex = 0;

            function typeLine() {
                if (lineIndex < hackLines.length) {
                    terminalOutput.innerHTML += hackLines[lineIndex] + "<br><br>";
                    playBeep(); // PLAY BEEP ON EVERY LINE
                    lineIndex++;
                    setTimeout(typeLine, Math.random() * 500 + 400); 
                } else {
                    startProgressBar();
                }
            }
            typeLine(); 
        }

        function startProgressBar() {
            document.getElementById('progress-wrapper').classList.remove('hidden');
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const status = document.getElementById('status-msg');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 8) + 1;
                if (progress > 100) progress = 100;

                bar.style.width = progress + "%";
                status.innerText = `DATA EXTRACTION: ${progress}% 🚨`;
                
                playBeep(); // PLAY BEEP AS PROGRESS MOVES

                if (progress === 100) {
                    clearInterval(interval);
                    setTimeout(revealTruth, 1200); 
                }
            }, 100); 
        }

        function revealTruth() {
            document.getElementById('hacker-overlay').classList.add('hidden');
            document.getElementById('reveal-screen').classList.remove('hidden');
            
            playSiren(); // TRIGGER THE SIREN ALARM!
        }

        // The final prank button
        document.getElementById('glitch-box').addEventListener('click', () => {
            if (document.exitFullscreen) { document.exitFullscreen().catch(err => console.log(err)); }
            clearInterval(alarmInterval); // Stop the siren
            alert("GOTCHA! 🤡 You've been pranked. Don't worry, your computer is fine. 🤣");
            location.reload(); 
        });

        // HIDDEN LAYER: Detect Panic Reactions
        let inputBuffer = "";
        
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                inputBuffer += "ESC"; 
            } else if (e.key.length === 1) {
                inputBuffer += e.key.toUpperCase(); 
            }

            if (
                inputBuffer.includes("ESCESCESC") || 
                inputBuffer.includes("STOP") || 
                inputBuffer.includes("EXIT") || 
                inputBuffer.includes("HELP")
            ) {
                clearInterval(alarmInterval); // Stop the siren if they escape!
                playBeep(); // Play a confirmation beep
                
                alert("TERMINAL OVERRIDE GRANTED. Welcome back, Admin. 👑");
                document.body.style.filter = "hue-rotate(90deg) invert(1)"; 
                inputBuffer = ""; 
                
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.log(err));
                }
            }

            if (inputBuffer.length > 15) {
                inputBuffer = inputBuffer.substring(1);
            }
        });
    </script>
</body>
</html>
