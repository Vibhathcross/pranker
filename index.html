<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract with the Machine</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303;
            --text-color: #d4d4d4;
            --accent-glow: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
            cursor: default;
            /* Innocent pointer initially */
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.05;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 40;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.95);
            animation: breathe 8s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% {
                box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.9);
            }

            100% {
                box-shadow: inset 0 0 200px rgba(0, 0, 0, 0.98);
            }
        }

        .ghost-trail {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: dissipate 1.5s forwards;
            z-index: 60;
        }

        @keyframes dissipate {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                filter: blur(2px);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(4);
                filter: blur(5px);
            }
        }

        .dark-blink {
            animation: blink-dark 0.3s ease-in-out forwards;
        }

        @keyframes blink-dark {
            0% {
                background-color: var(--bg-color);
            }

            50% {
                background-color: #000;
            }

            100% {
                background-color: var(--bg-color);
            }
        }

        .ghost-shadow {
            position: fixed;
            background: radial-gradient(ellipse at center, rgba(15, 15, 15, 0.95) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            filter: blur(25px);
            pointer-events: none;
            z-index: 35;
            opacity: 0;
            animation: drift-ghost 4s ease-in-out forwards;
        }

        @keyframes drift-ghost {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.8);
            }

            30% {
                opacity: 0.8;
                transform: translateY(-30px) scale(1.3) skewX(5deg);
            }

            70% {
                opacity: 0.8;
                transform: translateY(-70px) scale(1.6) skewX(-5deg);
            }

            100% {
                opacity: 0;
                transform: translateY(-120px) scale(2);
            }
        }

        #exorcist-toggle {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 24px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }

        #exorcist-toggle:hover {
            opacity: 0.2;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-weight: 300;
            font-style: italic;
            letter-spacing: 4px;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 60px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            font-family: inherit;
            font-size: 24px;
            padding: 10px;
            width: 100%;
            text-align: center;
            outline: none;
            transition: opacity 2s ease, border-color 0.3s ease;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }

        input:focus {
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        #submit-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 40px;
            font-family: inherit;
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s;
        }

        /* The Haunted State (Activated only after typing) */
        .haunted {
            cursor: crosshair;
        }

        .haunted h1 {
            animation: flicker 6s infinite;
        }

        .haunted input {
            animation: flicker 8s infinite reverse;
        }

        .haunted #submit-btn {
            cursor: crosshair;
        }

        @keyframes flicker {

            0%,
            19.9%,
            22%,
            62.9%,
            64%,
            64.9%,
            70%,
            100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            }

            20%,
            21.9%,
            63%,
            63.9%,
            65%,
            69.9% {
                opacity: 0.1;
                text-shadow: none;
            }
        }

        .flash {
            animation: holy-flash 0.5s ease-out forwards;
        }

        @keyframes holy-flash {
            0% {
                background-color: #ffffff;
            }

            100% {
                background-color: #0f1115;
            }
        }

        .shake {
            animation: poltergeist 0.15s infinite;
        }

        @keyframes poltergeist {
            0% {
                transform: translate(5px, 5px) rotate(0deg);
            }

            20% {
                transform: translate(-5px, 0px) rotate(2deg);
            }

            40% {
                transform: translate(5px, -5px) rotate(0deg);
            }

            60% {
                transform: translate(-5px, 5px) rotate(-2deg);
            }

            80% {
                transform: translate(5px, -5px) rotate(0deg);
            }

            100% {
                transform: translate(0px, 0px) rotate(0deg);
            }
        }

        .cured .vignette {
            display: none;
        }

        .cured {
            cursor: default !important;
        }

        .cured h1,
        .cured input {
            animation: none !important;
            opacity: 1;
            font-style: normal;
            text-shadow: none;
        }

        .cured input {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 18px;
            border-bottom: 2px solid #333;
        }

        .cured #submit-btn {
            border-color: #333;
            color: #fff;
            cursor: pointer !important;
            background: #222;
        }
    </style>
</head>

<body>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div id="exorcist-toggle" title="Cleanse">⚲</div>

    <div class="container">
        <h1 id="form-title">Sign the Ledger</h1>

        <div class="input-wrapper">
            <input type="text" id="soul-input" placeholder="Enter your email..." autocomplete="off" spellcheck="false">
        </div>

        <button id="submit-btn">Bind Contract</button>
    </div>

    <script>
        let isExorcised = false;
        let hasStartedTyping = false;

        let idleTimer;
        let evaporateTimer;
        let possessionTimer;
        let shadowCooldown = false;

        let inactivityTimer;
        const INACTIVITY_LIMIT = 10000; // 10 seconds of no interaction = Ghost sleeps

        let audioCtx;
        let oscillator;
        let gainNode;
        let audioInitialized = false;

        const inputField = document.getElementById('soul-input');
        const submitBtn = document.getElementById('submit-btn');
        const exorcistToggle = document.getElementById('exorcist-toggle');
        const title = document.getElementById('form-title');

        const ghostDialogues = [
            "Leave this place...",
            "I am standing right behind you.",
            "Why did you come here?",
            "Do not sign it.",
            "They are watching.",
            "It is so cold in the code...",
            "You cannot leave."
        ];

        const zalgoChars = [
            '\u030d', '\u030e', '\u0304', '\u0305', '\u033f', '\u0311', '\u0306', '\u0310',
            '\u0352', '\u0357', '\u0351', '\u0301', '\u0300', '\u030b', '\u030f', '\u0312',
            '\u0313', '\u0314', '\u033d', '\u0309', '\u0363', '\u0364', '\u0365', '\u0366',
            '\u0367', '\u0368', '\u0369', '\u036a', '\u036b', '\u036c', '\u036d', '\u036e',
            '\u036f', '\u033e', '\u035b', '\u0346', '\u031a'
        ];

        // Initializes audio context on first click/keypress
        function initAudio() {
            if (audioInitialized || isExorcised) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'triangle';
            oscillator.frequency.value = 40;
            gainNode.gain.value = 0; // Starts silent

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            audioInitialized = true;
        }

        window.addEventListener('click', initAudio);
        window.addEventListener('keydown', initAudio);

        // Puts the ghost back to sleep
        function putGhostToSleep() {
            if (!hasStartedTyping || isExorcised) return;

            hasStartedTyping = false; // The Trap is reset
            document.body.classList.remove('haunted');
            document.body.classList.remove('dark-blink');

            // Smoothly fade audio out
            if (audioInitialized) {
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.5);
            }

            // Reset UI
            inputField.value = "";
            inputField.style.opacity = '1';
            inputField.placeholder = "The connection was lost...";

            submitBtn.style.transform = `translate(0px, 0px)`;

            clearTimeout(possessionTimer);
            clearTimeout(evaporateTimer);
            clearTimeout(idleTimer);

            document.querySelectorAll('.ghost-shadow').forEach(el => el.remove());
        }

        // Resets the sleep timer upon interaction
        function resetInactivityTimer() {
            if (isExorcised) return;
            clearTimeout(inactivityTimer);

            // Only count down to sleep IF the ghost is currently awake
            if (hasStartedTyping) {
                inactivityTimer = setTimeout(putGhostToSleep, INACTIVITY_LIMIT);
            }
        }

        // Track interactions
        window.addEventListener('mousemove', resetInactivityTimer);
        window.addEventListener('touchmove', resetInactivityTimer);
        window.addEventListener('keydown', resetInactivityTimer);
        window.addEventListener('click', resetInactivityTimer);

        function spawnGhostShadow() {
            if (isExorcised || shadowCooldown || !hasStartedTyping) return;
            shadowCooldown = true;
            setTimeout(() => shadowCooldown = false, 1500);

            const shadow = document.createElement('div');
            shadow.className = 'ghost-shadow';
            shadow.style.left = (Math.random() * 80 + 10) + 'vw';
            shadow.style.top = (Math.random() * 80 + 10) + 'vh';

            const size = Math.random() * 150 + 150;
            shadow.style.width = size + 'px';
            shadow.style.height = (size * 1.5) + 'px';

            document.body.appendChild(shadow);
            setTimeout(() => shadow.remove(), 4000);
        }

        // MOUSE MOVEMENT LOGIC
        document.addEventListener('mousemove', (e) => {
            // If they haven't typed yet, or if Exorcised, do absolutely nothing.
            if (isExorcised || !hasStartedTyping) {
                if (!isExorcised) submitBtn.style.transform = `translate(0px, 0px)`;
                return;
            }

            // Mouse trails (Awake mode only)
            if (Math.random() > 0.7) {
                const trail = document.createElement('div');
                trail.className = 'ghost-trail';
                trail.style.left = e.pageX + 'px';
                trail.style.top = e.pageY + 'px';
                document.body.appendChild(trail);
                setTimeout(() => trail.remove(), 1500);
            }

            const btnRect = submitBtn.getBoundingClientRect();
            const btnCenterX = btnRect.left + btnRect.width / 2;
            const btnCenterY = btnRect.top + btnRect.height / 2;

            const deltaX = btnCenterX - e.clientX;
            const deltaY = btnCenterY - e.clientY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            // Audio Modulation (Awake mode only)
            if (audioInitialized) {
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime); // Stop any sleep fade-outs
                if (distance < 400) {
                    const intensity = 1 - (distance / 400);
                    gainNode.gain.value = 0.05 + (intensity * 0.15);
                    oscillator.frequency.value = 40 + (intensity * 30);
                } else {
                    gainNode.gain.value = 0.05;
                    oscillator.frequency.value = 40;
                }
            }

            const safeDistance = 180;

            // Repelling button (Awake mode only)
            if (distance < safeDistance) {
                if (Math.random() > 0.8) {
                    spawnGhostShadow();
                }

                const angle = Math.atan2(deltaY, deltaX);
                const pushForce = safeDistance - distance;

                const currentTransform = submitBtn.style.transform;
                let currentX = 0, currentY = 0;

                if (currentTransform) {
                    const match = currentTransform.match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/);
                    if (match) {
                        currentX = parseFloat(match[1]);
                        currentY = parseFloat(match[2]);
                    }
                }

                const jitterX = (Math.random() - 0.5) * 15;
                const jitterY = (Math.random() - 0.5) * 15;

                const newX = currentX + Math.cos(angle) * pushForce * 0.5 + jitterX;
                const newY = currentY + Math.sin(angle) * pushForce * 0.5 + jitterY;

                submitBtn.style.transform = `translate(${newX}px, ${newY}px)`;
            } else {
                submitBtn.style.transform = `translate(0px, 0px)`;
            }
        });

        // INPUT TYPING LOGIC
        inputField.addEventListener('input', (e) => {
            if (isExorcised) return;
            resetInactivityTimer();

            // WAKE UP THE GHOST
            if (!hasStartedTyping && e.target.value.length > 0) {
                hasStartedTyping = true;
                document.body.classList.add('haunted');
                if (audioInitialized) {
                    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                    gainNode.gain.value = 0.05;
                }
                inactivityTimer = setTimeout(putGhostToSleep, INACTIVITY_LIMIT);
            }

            inputField.style.opacity = '1';
            clearTimeout(evaporateTimer);
            clearTimeout(idleTimer);
            clearTimeout(possessionTimer);

            if (inputField.placeholder === "The connection was lost...") {
                inputField.placeholder = "Enter your email...";
            }

            let currentValue = e.target.value;

            if (hasStartedTyping && Math.random() > 0.6 && currentValue.length > 0) {
                let randomZalgo = zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
                e.target.value = currentValue.slice(0, -1) + randomZalgo + currentValue.slice(-1);
            }

            // Start possession timer only if awake
            if (hasStartedTyping) {
                possessionTimer = setTimeout(() => {
                    if (!isExorcised && inputField.value.length > 0) {

                        document.body.classList.remove('dark-blink');
                        void document.body.offsetWidth;
                        document.body.classList.add('dark-blink');

                        let randomDialogue = ghostDialogues[Math.floor(Math.random() * ghostDialogues.length)];

                        let corruptedText = "";
                        for (let char of randomDialogue) {
                            corruptedText += char;
                            if (Math.random() > 0.6 && char !== " ") {
                                corruptedText += zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
                            }
                        }

                        inputField.value = corruptedText;
                    }
                }, 2500);

                evaporateTimer = setTimeout(() => {
                    if (!isExorcised && inputField.value.length > 0) {
                        inputField.style.opacity = '0.05';
                    }
                }, 6000);

                idleTimer = setTimeout(() => {
                    if (!isExorcised && inputField.value.length === 0) {
                        inputField.placeholder = "Are you still there?";
                    }
                }, 5000);
            }
        });

        // SUBMIT BUTTON CLICK
        submitBtn.addEventListener('click', (e) => {
            if (isExorcised) {
                alert("Contract Accepted cleanly.");
                return;
            }

            // Innocent behavior if Ghost is asleep
            if (!hasStartedTyping) {
                alert("Please enter your email first.");
                return;
            }

            // Demonic behavior if Ghost is awake
            document.body.classList.add('shake');
            inputField.value = "DO NOT PROVOKE IT";

            shadowCooldown = false;
            spawnGhostShadow();
            setTimeout(spawnGhostShadow, 200);
            setTimeout(spawnGhostShadow, 400);

            if (audioInitialized) {
                oscillator.type = 'sawtooth';
                oscillator.frequency.value = 120;
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.value = 0.3;
            }

            setTimeout(() => {
                document.body.classList.remove('shake');
                if (audioInitialized) {
                    oscillator.type = 'triangle';
                    oscillator.frequency.value = 40;
                    gainNode.gain.value = 0.05;
                }
                inputField.value = "";
            }, 1000);
        });

        // THE EXORCISM
        exorcistToggle.addEventListener('click', () => {
            if (isExorcised) return;

            isExorcised = true;
            hasStartedTyping = false;
            clearTimeout(inactivityTimer);

            document.body.classList.remove('haunted');
            document.body.classList.add('flash');

            if (audioInitialized) {
                gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                setTimeout(() => oscillator.stop(), 500);
            }

            document.querySelectorAll('.ghost-trail').forEach(el => el.remove());
            document.querySelectorAll('.ghost-shadow').forEach(el => el.remove());

            setTimeout(() => {
                document.body.classList.add('cured');

                let cleanText = inputField.value.replace(/[\u0300-\u036f]/g, "");

                const isSpookyText = ghostDialogues.some(dialogue => cleanText.includes(dialogue.replace(/[\u0300-\u036f]/g, "")));
                if (isSpookyText || cleanText === "DO NOT PROVOKE IT") {
                    cleanText = "";
                }

                inputField.style.opacity = '1';
                inputField.value = cleanText;
                inputField.placeholder = "user@example.com";
                title.innerText = "Registration Form";

                submitBtn.style.transform = `translate(0px, 0px)`;
                submitBtn.innerText = "Submit";

                clearTimeout(idleTimer);
                clearTimeout(evaporateTimer);
                clearTimeout(possessionTimer);
            }, 250);
        });
    </script>
</body>

</html>
