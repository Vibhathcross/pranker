<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Gateway</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            background: #f0f2f5;
            height: 100vh;
            width: 100vw;
            /* Prevent double-tap zoom on mobile so they can tap fast! */
            touch-action: manipulation; 
        }

        .hidden { display: none !important; }

        /* --- PHASE 1: THE BAIT --- */
        #bait-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            padding: 20px;
        }

        .verify-box {
            background: white;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        button {
            background: #0056b3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            font-weight: bold;
            width: 100%;
        }

        button:hover { background: #004494; }

        /* --- PHASE 2: THE HACKER TERMINAL --- */
        #hacker-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #050505;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-shadow: 0 0 5px #0f0;
        }

        #hacker-overlay::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        .terminal {
            width: 90%;
            max-width: 800px;
            z-index: 3;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .progress-container {
            width: 100%;
            height: 25px;
            border: 2px solid #0f0;
            margin-top: 30px;
            box-shadow: 0 0 10px #0f0;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #0f0;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px #0f0;
        }

        .cursor { animation: blink 1s infinite; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- PHASE 3: THE REVEAL --- */
        #reveal-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: alarmPulse 1.5s infinite;
            padding: 20px;
            box-sizing: border-box; /* Keeps padding inside the screen bounds */
        }

        @keyframes alarmPulse {
            0% { background: radial-gradient(circle, #4a0000, #000); }
            50% { background: radial-gradient(circle, #8a0000, #110000); }
            100% { background: radial-gradient(circle, #4a0000, #000); }
        }

        #reveal-screen h1 {
            font-size: clamp(2rem, 11vw, 4rem); /* Responsive font size */
            color: #ff3333;
            text-shadow: 0 0 20px red;
            margin-bottom: 10px;
            font-family: 'Segoe UI', sans-serif;
            width: 100%;
            overflow-wrap: break-word; /* Prevents long words from breaking the layout */
        }

        #glitch-box {
            display: inline-block;
            padding: 20px 30px;
            border: 3px solid cyan;
            color: cyan;
            font-size: clamp(1rem, 5vw, 1.5rem);
            font-weight: bold;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            background: rgba(0, 255, 255, 0.1);
        }

        #glitch-box:hover, #glitch-box:active {
            animation: shake 0.1s infinite;
            background: red;
            color: white;
            border-color: red;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div id="bait-screen">
        <div class="verify-box">
            <h2 id="bait-text">Human Verification Required 🤖</h2>
            <p>Please click the button below to access the secure portfolio.</p>
            <button id="start-btn">Verify & Enter</button>
        </div>
    </div>

    <div id="hacker-overlay" class="hidden">
        <div class="terminal">
            <div id="terminal-output"></div>
            <span class="cursor">█</span>
            <div id="progress-wrapper" class="hidden">
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <div id="status-msg" style="margin-top: 15px; font-weight: bold; font-size: 1.2rem;"></div> 
            </div>
        </div>
    </div>

    <div id="reveal-screen" class="hidden">
        <h1>SYSTEM COMPROMISED 💀</h1>
        <p style="font-size: 1rem; font-family: monospace; color: #ccc;">Critical failure. All personal directories have been encrypted and uploaded. 😈</p>
        
        <div id="glitch-box">
            Initiate Emergency Recovery ☢️
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx;
        let alarmInterval;
        let prankActive = false;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800 + Math.random() * 400, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSiren() {
            if (!audioCtx) return;
            function triggerSirenCycle() {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.4);
                osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            }
            triggerSirenCycle();
            alarmInterval = setInterval(triggerSirenCycle, 850);
        }

        // --- SEQUENCE LOGIC ---
        document.getElementById('start-btn').addEventListener('click', function() {
            initAudio();
            
            // Mobile-friendly fullscreen request
            let docEl = document.documentElement;
            let requestFullScreen = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            if (requestFullScreen) requestFullScreen.call(docEl).catch(err => console.log(err));

            this.innerText = "Verifying... ⏳";
            this.style.background = "#555";
            this.disabled = true;
            document.getElementById('bait-text').innerText = "Connection Established. 👁️";
            prankActive = true;

            setTimeout(startHackingSequence, 2000);
        });

        function startHackingSequence() {
            document.getElementById('bait-screen').classList.add('hidden');
            document.getElementById('hacker-overlay').classList.remove('hidden');

            const fakeIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            const hackLines = [
                `> TARGET ACQUIRED: IP ${fakeIP} 🎯`,
                "> Bypassing primary firewall... 🛡️",
                "> Injecting payload into root directory... 🕷️",
                "> Accessing connected cameras... 📸",
                "> Decrypting saved passwords... 🔓",
                "> Extracting user files... 💸"
            ];

            const terminalOutput = document.getElementById('terminal-output');
            let lineIndex = 0;

            function typeLine() {
                if (lineIndex < hackLines.length && prankActive) {
                    terminalOutput.innerHTML += hackLines[lineIndex] + "<br><br>";
                    playBeep(); 
                    lineIndex++;
                    setTimeout(typeLine, Math.random() * 500 + 400); 
                } else if (prankActive) {
                    startProgressBar();
                }
            }
            typeLine(); 
        }

        function startProgressBar() {
            document.getElementById('progress-wrapper').classList.remove('hidden');
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const status = document.getElementById('status-msg');

            const interval = setInterval(() => {
                if (!prankActive) {
                    clearInterval(interval);
                    return;
                }
                
                progress += Math.floor(Math.random() * 8) + 1;
                if (progress > 100) progress = 100;

                bar.style.width = progress + "%";
                status.innerText = `DATA EXTRACTION: ${progress}% 🚨`;
                playBeep(); 

                if (progress === 100) {
                    clearInterval(interval);
                    setTimeout(revealTruth, 1200); 
                }
            }, 100); 
        }

        function revealTruth() {
            if(!prankActive) return;
            document.getElementById('hacker-overlay').classList.add('hidden');
            document.getElementById('reveal-screen').classList.remove('hidden');
            playSiren(); 
        }

        // The final prank end button
        document.getElementById('glitch-box').addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent this click from counting towards the panic tap
            endPrank(false);
            alert("GOTCHA! 🤡 You've been pranked. Don't worry, your device is fine. 🤣");
            location.reload(); 
        });

        // --- HIDDEN LOOPHOLES (MOBILE & DESKTOP) ---

        function endPrank(isSecret) {
            prankActive = false;
            clearInterval(alarmInterval);
            
            let doc = window.document;
            let exitFullScreen = doc.exitFullscreen || doc.webkitExitFullscreen || doc.mozCancelFullScreen || doc.msExitFullscreen;
            if (exitFullScreen && document.fullscreenElement) exitFullScreen.call(doc).catch(err => console.log(err));

            if (isSecret) {
                playBeep();
                alert("TERMINAL OVERRIDE GRANTED. Welcome back, Admin. 👑");
                document.body.style.filter = "hue-rotate(90deg) invert(1)"; 
            }
        }

        // 1. DESKTOP: Keyboard Panic
        let inputBuffer = "";
        document.addEventListener('keydown', (e) => {
            if (!prankActive) return;
            
            if (e.key === "Escape") inputBuffer += "ESC"; 
            else if (e.key.length === 1) inputBuffer += e.key.toUpperCase(); 

            if (inputBuffer.includes("ESCESCESC") || inputBuffer.includes("STOP") || inputBuffer.includes("EXIT") || inputBuffer.includes("HELP")) {
                endPrank(true);
                inputBuffer = ""; 
            }
            if (inputBuffer.length > 15) inputBuffer = inputBuffer.substring(1);
        });

        // 2. MOBILE: Screen Panic Tap Detector
        let tapTimes = [];
        document.addEventListener('click', (e) => {
            // Ignore the initial start button
            if (!prankActive || e.target.id === 'start-btn') return;

            const now = Date.now();
            tapTimes.push(now);

            // Keep only the last 5 taps in memory
            if (tapTimes.length > 5) {
                tapTimes.shift(); // Remove the oldest tap
            }

            // If 5 taps happen within 2000 milliseconds (2 seconds)...
            if (tapTimes.length === 5 && (now - tapTimes[0] < 2000)) {
                endPrank(true);
                tapTimes = []; // Reset the tracker
            }
        });
    </script>
</body>
</html>
